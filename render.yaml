services:
  - type: web
    name: sioslive
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma db push && node src/seed.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sios-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: FRONTEND_URL
        value: https://sios-runtime.netlify.app

databases:
  - name: sios-db
    plan: free
    databaseName: sios
    user: sios

