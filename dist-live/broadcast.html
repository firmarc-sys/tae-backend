<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SIOS Master Architect</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { 
  width: 100%; height: 100%; overflow: hidden; 
  background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
#app { width: 100%; height: 100%; position: relative; }

/* Page container - full screen image */
.page { 
  display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0;
  overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
}
.page.active { display: block; }
.page::-webkit-scrollbar { display: none; }

/* The replicated image fills the width naturally */
.page-img { 
  width: 100%; display: block; pointer-events: none; user-select: none;
}

/* Hotspot overlay system - invisible clickable areas on top of image */
.hotspot-layer {
  position: absolute; top: 0; left: 0; width: 100%; height: auto;
  pointer-events: none;
}
.hotspot {
  position: absolute; pointer-events: auto; cursor: pointer;
  border-radius: 12px; transition: all 0.2s;
}
.hotspot:active { background: rgba(255,255,255,0.1); transform: scale(0.97); }

/* Navigation overlay */
.nav-overlay {
  position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent);
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 10px 20px; z-index: 1000; backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 12px; border-radius: 12px; cursor: pointer;
  transition: all 0.3s; border: none; background: none; color: rgba(255,255,255,0.5);
}
.nav-btn.active { color: #00e5ff; }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

/* Top status bar overlay */
.status-overlay {
  position: fixed; top: 0; left: 0; right: 0; height: 44px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; z-index: 1000; font-size: 13px; font-weight: 600;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.status-overlay .time { font-variant-numeric: tabular-nums; }

/* Page indicator dots */
.page-indicator {
  position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 1000; padding: 6px 12px;
  background: rgba(0,0,0,0.5); border-radius: 20px; backdrop-filter: blur(10px);
}
.page-indicator .dot {
  width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3);
  transition: all 0.3s;
}
.page-indicator .dot.active { background: #00e5ff; width: 18px; border-radius: 3px; }

/* Toast */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-100px);
  padding: 10px 20px; border-radius: 20px; background: rgba(0,0,0,0.9);
  border: 1px solid rgba(0,229,255,0.3); color: #00e5ff; font-size: 13px; font-weight: 600;
  z-index: 10000; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
  backdrop-filter: blur(10px);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media (min-width: 768px) {
  body { display: flex; align-items: center; justify-content: center; background: #0a0a12; }
  #app { width: 414px; height: 896px; border-radius: 40px; overflow: hidden; position: relative; }
  .nav-overlay, .status-overlay, .page-indicator { width: 414px; left: 50%; transform: translateX(-50%); }
}
</style>
</head>
<body>
<div id="app">
    <div class="page active" id="page-home" data-title="Home Core">
      <img src="https://bdd3b46d.preview.workshop.ai/assets/pages/home-core.png" alt="Home Core" class="page-img">
      <div class="hotspot-layer">
        <div class="hotspot" style="top:8%;left:5%;width:90%;height:12%;" onclick="goTo('nova')"></div>
        <div class="hotspot" style="top:22%;left:5%;width:90%;height:12%;" onclick="goTo('fin')"></div>
      </div>
    </div>
    <div class="nav-overlay">
        <button class="nav-btn active" onclick="goTo('home')"><span>Home</span></button>
        <button class="nav-btn" onclick="goTo('nova')"><span>Nova</span></button>
        <button class="nav-btn" onclick="goTo('fin')"><span>Fin</span></button>
    </div>
    <div class="toast" id="toast"></div>
</div>
<script>
let current = 'home';
function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + page);
  if (target) {
      target.classList.add('active');
      current = page;
      showToast('Navigated to ' + page);
  }
}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
</body>

<script>
// === BACKEND HOOKS (Ready for API Integration) ===
async function apiGet(endpoint) {
  try {
    const res = await fetch('/api' + endpoint);
    return await res.json();
  } catch (e) {
    console.error('API GET failed:', endpoint, e);
    return { error: 'Connection failed' };
  }
}

async function apiPost(endpoint, body = {}) {
  try {
    const res = await fetch('/api' + endpoint, { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' }, 
      body: JSON.stringify(body) 
    });
    return await res.json();
  } catch (e) {
    console.error('API POST failed:', endpoint, e);
    return { error: 'Connection failed' };
  }
}

const backend = {
  syncSystems:   () => apiPost('/system/sync'),
  getHealth:     () => apiGet('/nova/health'),
  getPortfolio:  () => apiGet('/fin/portfolio'),
  getSignals:    () => apiGet('/alphabeta/signals'),
  getDevices:    () => apiGet('/iot/devices'),
  getChannels:   () => apiGet('/orbit/channels'),
  getValidators: () => apiGet('/quantum/validators'),
  verifyId:      () => apiPost('/identity/verify'),
  getUser:       () => apiGet('/user/profile'),
};

console.log('SIOS App initialized. Backend hooks ready.');
</script>

</html>
