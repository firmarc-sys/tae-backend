<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIOS Auth Callback</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      (async () => {
        const hash = window.location.hash;
        if (hash) {
          localStorage.setItem("sios_auth_hash", hash);
        }
        window.location.href = "/";
      })();
    </script>
  </body>
</html>
